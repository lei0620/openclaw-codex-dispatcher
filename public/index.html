<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>手机遥控 Codex</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="sidebar-scrim" class="sidebar-scrim" hidden></div>
    <main class="app-shell">
      <aside id="conversation-sidebar" class="conversation-sidebar" aria-label="项目和对话">
        <div class="sidebar-header">
          <div>
            <h1>手机遥控 Codex</h1>
            <p>像和 Codex 聊天一样发任务</p>
          </div>
          <button id="sidebar-close" class="icon-button sidebar-close" type="button" aria-label="关闭对话列表">
            <span class="close-mark" aria-hidden="true"></span>
          </button>
        </div>
        <button id="new-conversation" class="new-conversation" type="button">新对话</button>
        <nav id="conversation-list" class="conversation-list" aria-label="项目和历史对话"></nav>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div class="title-row">
            <button id="sidebar-toggle" class="icon-button menu-button" type="button" aria-label="打开对话列表">
              <span class="menu-lines" aria-hidden="true"></span>
            </button>
            <div class="brand">
              <h2 id="current-project-name">选择项目</h2>
              <p id="conversation-title">选择一个对话或新建对话</p>
            </div>
          </div>
          <div class="connection">
            <span id="status" class="status-pill">正在连接</span>
            <button id="refresh" type="button">刷新</button>
          </div>
        </header>

        <section class="setup-panel" aria-label="连接设置">
          <label class="token-field">
            访问密码
            <input id="token" type="password" autocomplete="off" placeholder="输入一次后会保存在本机浏览器" />
          </label>
          <button id="save-token" type="button">保存密码</button>
          <label>
            执行方式
            <select id="mode"></select>
          </label>
        </section>

        <section class="agent-panel" aria-label="我的 Win11 电脑">
          <div>
            <h2>我的 Win11 电脑</h2>
            <p>这里显示哪台电脑正在等你发任务。</p>
          </div>
          <div id="agents" class="agent-list"></div>
        </section>

        <section class="chat-panel" aria-label="Codex 对话">
          <div id="messages" class="messages" aria-live="polite"></div>
          <form id="chat-form" class="chat-form">
            <textarea
              id="prompt"
              rows="3"
              placeholder="直接输入给 Codex 的话，比如：帮我检查这个项目怎么启动"
            ></textarea>
            <div class="chat-actions">
              <p>第一次建议选“只测试连接”，确认 Win11 能收到任务后再正式执行。</p>
              <button id="submit" type="submit">发送给 Codex</button>
            </div>
          </form>
        </section>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
