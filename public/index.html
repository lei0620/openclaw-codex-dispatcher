<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>手机遥控 Codex</title>
    <link rel="stylesheet" href="/styles.css?v=1.9.6" />
  </head>
  <body>
    <div id="sidebar-scrim" class="sidebar-scrim" hidden></div>
    <div id="settings-scrim" class="settings-scrim" hidden></div>
    <main class="app-shell">
      <aside id="conversation-sidebar" class="conversation-sidebar" aria-label="项目和对话">
        <div class="sidebar-header">
          <div>
            <h1>Codex</h1>
            <p>像和 Codex 聊天一样发任务</p>
          </div>
          <button id="sidebar-close" class="icon-button sidebar-close" type="button" aria-label="关闭对话列表">
            <span class="close-mark" aria-hidden="true"></span>
          </button>
        </div>
        <button id="new-conversation" class="new-conversation" type="button">新对话</button>
        <nav id="conversation-list" class="conversation-list" aria-label="项目和历史对话"></nav>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div class="title-row">
            <button id="sidebar-toggle" class="icon-button menu-button" type="button" aria-label="打开对话列表">
              <img class="topbar-icon" src="/icons/menu.png" alt="" aria-hidden="true" />
            </button>
            <div class="brand">
              <h2 id="current-project-name">Codex</h2>
              <p id="conversation-title">选择一个对话或新建对话</p>
            </div>
          </div>
          <div class="connection">
            <button id="current-window-toggle" class="window-switcher-toggle" type="button" aria-label="切换绑定的 Codex 窗口" aria-expanded="false">
              <img class="topbar-icon" src="/icons/window.png" alt="" aria-hidden="true" />
              <span id="current-window-label" class="visually-hidden">窗口</span>
            </button>
            <button id="status-icon" class="connection-status computer-status recovering" type="button" aria-label="正在连接" title="正在连接" aria-expanded="false">
              <img class="topbar-icon" src="/icons/device.png" alt="" aria-hidden="true" />
            </button>
            <div id="connection-details" class="connection-details" hidden>
              <div><span>NAS</span><strong id="nas-status">检查中</strong></div>
              <div><span>电脑</span><strong id="agent-status">检查中</strong></div>
              <div><span>Codex</span><strong id="codex-status">检查中</strong></div>
            </div>
            <button id="sync-conversations" class="icon-button sync-open" type="button" aria-label="同步电脑 Codex 对话" title="同步电脑 Codex 对话">
              <img class="topbar-icon" src="/icons/sync.png" alt="" aria-hidden="true" />
            </button>
            <button id="approval-toggle" class="icon-button approval-open" type="button" aria-label="打开权限收件箱" title="权限收件箱" aria-expanded="false">
              <img class="topbar-icon" src="/icons/approval.png" alt="" aria-hidden="true" />
              <span id="approval-count" class="approval-count" hidden>0</span>
            </button>
            <button id="settings-open" class="icon-button settings-open" type="button" aria-label="打开设置">
              <img class="topbar-icon" src="/icons/settings.png" alt="" aria-hidden="true" />
            </button>
          </div>
        </header>
        <div id="window-picker" class="window-picker" hidden></div>
        <div id="approval-inbox" class="approval-inbox" aria-live="polite" hidden></div>
        <div id="active-sessions" class="active-sessions" aria-label="正在执行的会话" hidden></div>

        <section class="chat-panel" aria-label="Codex 对话">
          <div id="messages" class="messages" aria-live="polite"></div>
          <button id="jump-to-latest" class="jump-to-latest" type="button" hidden>回到最新</button>
          <p id="submit-error" class="submit-error" role="alert" hidden></p>
          <form id="chat-form" class="chat-form">
            <textarea
              id="prompt"
              rows="1"
              placeholder="直接输入给 Codex..."
            ></textarea>
            <button id="submit" class="send-button" type="submit">发送</button>
          </form>
        </section>
      </section>
    </main>
    <aside id="settings-panel" class="settings-panel" aria-label="设置" hidden>
      <header class="settings-header">
        <div>
          <h2>设置</h2>
          <p>连接、执行方式和更新</p>
        </div>
        <button id="settings-close" class="icon-button" type="button" aria-label="关闭设置">
          <span class="close-mark" aria-hidden="true"></span>
        </button>
      </header>

      <section class="settings-section">
        <h3>我的 Win11 电脑</h3>
        <div class="settings-status-row">
          <span id="status" class="status-text">正在连接</span>
          <button id="refresh" class="secondary compact-button" type="button">刷新</button>
        </div>
        <div id="agents" class="agent-list"></div>
        <label>
          服务地址
          <input id="api-base" type="url" autocomplete="off" placeholder="http://192.168.101.8:1314" />
        </label>
        <div class="settings-actions">
          <button id="save-api-base" class="secondary" type="button">保存服务地址</button>
          <button id="reset-api-base" class="secondary" type="button">恢复局域网地址</button>
        </div>
        <label class="token-field">
          访问密码
          <input id="token" type="password" autocomplete="off" placeholder="输入一次后会加密保存在本机" />
        </label>
        <div class="settings-actions">
          <button id="save-token" type="button">保存密码</button>
          <button id="reset-token" class="secondary" type="button">恢复默认密码</button>
        </div>
      </section>

      <section id="background-notifications-section" class="settings-section" hidden>
        <h3>后台提醒</h3>
        <label class="settings-toggle">
          <span>锁屏和切到后台后继续接收权限与任务结果</span>
          <input id="background-notifications" type="checkbox" />
        </label>
        <p class="settings-hint">开启期间会保持后台连接，可能会略微增加耗电。</p>
        <p id="background-notifications-status" class="settings-hint">正在读取状态...</p>
      </section>

      <section class="settings-section">
        <h3>任务</h3>
        <label>
          执行方式
          <select id="mode"></select>
        </label>
        <label>
          绑定 Codex 窗口
          <select id="refresh-window-binding"></select>
        </label>
        <p id="refresh-window-help" class="settings-hint">绑定后，这个会话完成时只刷新指定的电脑 Codex 窗口。</p>
        <label class="settings-toggle">
          <span>自动切到桌面最新对话（与最新会话保持同步）</span>
          <input id="auto-follow-conversation" type="checkbox" />
        </label>
      </section>

      <section class="settings-section">
        <h3>连接诊断</h3>
        <div id="diagnostics-summary" class="diagnostics-grid"></div>
        <div class="settings-actions">
          <button id="export-diagnostics" class="secondary" type="button">复制脱敏诊断</button>
        </div>
        <p id="diagnostics-status" class="settings-hint" hidden></p>
      </section>

      <section class="settings-section">
        <h3>应用更新</h3>
        <div class="version-card">
          <div>
            <span>当前版本</span>
            <strong id="app-version">v1.3.0</strong>
          </div>
          <p id="release-notes">本版支持 NAS 重启后自动拉起面板服务，并在 Win11 打开 Codex 后自动上线。</p>
        </div>
        <div class="settings-actions">
          <button id="check-update" class="secondary" type="button" hidden>检查更新</button>
          <button id="install-update" type="button" hidden>立即升级</button>
        </div>
        <p id="update-status" class="update-status" hidden></p>
      </section>
    </aside>
    <script type="module" src="/app.js?v=1.9.6"></script>
  </body>
</html>
